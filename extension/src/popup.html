<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Add Comics to Reading List</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <div class="popup-row">
        <select id="list-select" aria-label="Reading list"></select>
        <button id="new-list-btn" type="button" title="Create a new list">+</button>
      </div>

      <ul id="pending-list" class="pending-list"></ul>
      <p id="empty-message" class="empty-message">Click a comic on the page to add it here.</p>

      <div class="popup-actions">
        <button id="cancel-btn" type="button">Cancel</button>
        <button id="submit-btn" type="button" class="primary">Submit</button>
      </div>
      <p id="status-message" class="status-message"></p>
      <button id="options-link" type="button" class="options-link">Settings</button>
    </div>

    <script src="lib/browser-polyfill.js"></script>
    <script src="lib/config.js"></script>
    <script src="lib/api.js"></script>
    <script src="lib/messaging.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
