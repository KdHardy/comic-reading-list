<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reading List Extension Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        padding: 20px;
        max-width: 480px;
      }
      label {
        display: block;
        margin-top: 14px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 7px 9px;
        margin-top: 4px;
        box-sizing: border-box;
        border: 1px solid #d8dbe0;
        border-radius: 6px;
        font: inherit;
      }
      button {
        margin-top: 18px;
        padding: 8px 18px;
        border-radius: 6px;
        border: 1px solid #2563eb;
        background: #2563eb;
        color: white;
        font: inherit;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        color: #2563eb;
        min-height: 18px;
      }
      p.hint {
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Reading List Extension Settings</h1>
    <p class="hint">
      Enter the details from your Supabase project (Project Settings → API), and the write secret you
      inserted into the <code>app_secret</code> table.
    </p>

    <label>Supabase URL<input id="supabaseUrl" placeholder="https://your-project-ref.supabase.co" /></label>
    <label>Anon public key<input id="anonKey" /></label>
    <label>Write secret<input id="writeSecret" type="password" /></label>
    <button id="save" type="button">Save</button>
    <p id="status"></p>

    <script src="lib/browser-polyfill.js"></script>
    <script src="lib/config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
